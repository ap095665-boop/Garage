<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Garage</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
transition:background .6s ease;
}

/* glowing pulse */

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,255,255,.2)}
50%{box-shadow:0 0 40px rgba(255,255,255,.7)}
100%{box-shadow:0 0 10px rgba(255,255,255,.2)}
}

/* ripple */

@keyframes ripple{
0%{transform:scale(.5); opacity:.8}
100%{transform:scale(3); opacity:0}
}

/* cinematic flash */

@keyframes flash{
0%{opacity:0}
40%{opacity:1}
100%{opacity:0}
}

/* popup animations */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideDown{
from{opacity:0; transform:translateY(-40px)}
to{opacity:1; transform:translateY(0)}
}

@keyframes zoomIn{
from{opacity:0; transform:scale(.6)}
to{opacity:1; transform:scale(1)}
}

@keyframes rotateIn{
from{opacity:0; transform:rotate(-20deg)}
to{opacity:1; transform:rotate(0)}
}

@keyframes flipIn{
from{opacity:0; transform:rotateX(90deg)}
to{opacity:1; transform:rotateX(0)}
}

/* top message card */

#textCard{
position:absolute;
top:70px;
background:rgba(0,0,0,.6);
color:white;
padding:12px 22px;
border-radius:10px;
font-size:18px;
opacity:0;
}

/* tap circle */

#tapCircle{
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,.1);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
cursor:pointer;
user-select:none;
animation:pulse 3s infinite;
position:relative;
}

#tapCircle:active{
transform:scale(.94);
}

/* ripple element */

.ripple{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:2px solid rgba(255,255,255,.7);
animation:ripple .6s ease-out;
pointer-events:none;
}

/* flash */

#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* full popup overlay */

#popupScreen{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:28px;
display:none;
z-index:20;
}

/* item card screen */

#itemScreen{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

#itemCard{
width:300px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.45);
}

#itemCard img{
width:100%;
display:block;
}

.subtitle{
padding:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="textCard"></div>

<div id="tapCircle">Tap</div>

<div id="flash"></div>

<!-- popup screen -->

<div id="popupScreen">
<div id="popupText">Item Found</div>
</div>

<!-- item screen -->

<div id="itemScreen">

<div id="itemCard">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<div class="subtitle">Secure Vault</div>
</div>

</div>

<script>

let tap=0
let locked=false

const circle=document.getElementById("tapCircle")
const text=document.getElementById("textCard")
const flash=document.getElementById("flash")
const popup=document.getElementById("popupScreen")
const popupText=document.getElementById("popupText")
const itemScreen=document.getElementById("itemScreen")

const gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#36d1dc,#5b86e5)",
"linear-gradient(135deg,#f7971e,#ffd200)",
"linear-gradient(135deg,#00c6ff,#0072ff)",
"linear-gradient(135deg,#8e2de2,#4a00e0)"
]

const messages=[
"Accessing garage...",
"Scanning system...",
"Decrypting layers...",
"Verifying tools...",
"Unlocking vault..."
]

const popupAnimations=[
"fadeIn",
"slideDown",
"zoomIn",
"rotateIn",
"flipIn"
]

circle.onclick=function(){

if(locked)return

/* ripple */

let ripple=document.createElement("span")
ripple.className="ripple"
circle.appendChild(ripple)
setTimeout(()=>ripple.remove(),600)

if(tap<5){

document.body.style.background=gradients[tap]

text.style.opacity=1
text.innerText=messages[tap]

/* popup animation */

popupText.style.animation="none"
void popupText.offsetWidth
popupText.style.animation=popupAnimations[tap]+" .6s forwards"

tap++

if(tap==5){

locked=true

setTimeout(()=>{

/* flash */

flash.style.animation="flash .6s"

/* popup screen */

popup.style.display="flex"

setTimeout(()=>{

popup.style.display="none"

/* item screen */

itemScreen.style.display="flex"

},1600)

},700)

}

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Garage</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background:linear-gradient(135deg,#0f2027,#203a43);
  transition: background 0.6s ease;
}

/* BIG TAP CIRCLE */
#circle {
  width:220px;
  height:220px;
  border-radius:50%;
  background:linear-gradient(145deg,#1c1c1c,#2b2b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  color:white;
  cursor:pointer;
  user-select:none;
  position:relative;
  z-index:10;
  box-shadow:
    0 0 40px rgba(255,255,255,0.05),
    0 20px 50px rgba(0,0,0,0.6);
  transition: transform 0.2s ease, opacity 0.6s ease;
}

#circle:active {
  transform:scale(0.95);
}

/* CARD CONTAINER */
#cardContainer {
  position:absolute;
  opacity:0;
  transform:scale(0.8) translateY(60px);
  transition: all 0.9s cubic-bezier(.2,.8,.2,1);
  pointer-events:none;
}

/* CARD */
#card {
  width:340px;
  background:#ffffff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
  animation: floatCard 3s ease-in-out infinite;
}

#card img {
  width:100%;
  display:block;
}

.subtitle {
  padding:18px;
  font-size:20px;
  font-weight:bold;
  color:#000;
}

/* Reveal Animation */
.reveal {
  opacity:1 !important;
  transform:scale(1) translateY(0) !important;
  pointer-events:auto !important;
}

/* Floating animation */
@keyframes floatCard {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div id="circle">Tap 5 Times</div>

<div id="cardContainer">
  <div id="card">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi4_9-cxLIbHyEjh7DY9k-0MM492CYFnv18jZWEKdIAeoefOeA6buR-7t2zW2-CcRYhdPb2uS7GIH2TjQrypB5N9EfBrgE8ElJ-n7Hd8uzWM8wYczlndStau049Ij0Te95VQ-Q8unyic5xRAldCX9Imk4aNwVrbiyxq-fe4cuKC2UARcxCKU6XmNAJK2cw/s1600/file_000000001368720693652074d42e904c.png">
    <div class="subtitle">Secure Vault</div>
  </div>
</div>

<script>

window.onload = function(){

  let tapCount = 0;
  const circle = document.getElementById("circle");
  const body = document.body;

  const gradients = [
    "linear-gradient(135deg,#1e3c72,#2a5298)",
    "linear-gradient(135deg,#0f2027,#203a43)",
    "linear-gradient(135deg,#232526,#414345)",
    "linear-gradient(135deg,#42275a,#734b6d)",
    "linear-gradient(135deg,#134E5E,#71B280)"
  ];

  circle.addEventListener("click", function(){

    tapCount++;

    body.style.background = gradients[tapCount-1] || gradients[4];

    if(tapCount < 5){
      circle.innerText = "Tap " + (5 - tapCount) + " More";
    } else {
      circle.innerText = "Unlocked";
      unlock();
    }

  });

  function unlock(){

    circle.style.transform = "scale(0)";
    circle.style.opacity = "0";

    setTimeout(function(){
      document.getElementById("cardContainer").classList.add("reveal");
    },600);

  }

};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Garage</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  background:#111;
  overflow:hidden;
  transition: background 0.5s ease;
}

#circle {
  width:200px;
  height:200px;
  border-radius:50%;
  background:linear-gradient(145deg,#222,#333);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  color:white;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  user-select:none;
  transition: transform 0.2s ease, opacity 0.6s ease;
}

#circle:active {
  transform:scale(0.95);
}

#cardContainer {
  position:absolute;
  opacity:0;
  transform:translateY(50px) scale(0.9);
  transition: all 0.8s cubic-bezier(.2,.8,.2,1);
}

#card {
  width:340px;
  background:#fff;
  color:#000;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,0.4);
}

#card img {
  width:100%;
  display:block;
}

.subtitle {
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

.reveal {
  opacity:1 !important;
  transform:translateY(0) scale(1) !important;
}
</style>
</head>

<body>

<div id="circle">Tap 5 Times</div>

<div id="cardContainer">
  <div id="card">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi4_9-cxLIbHyEjh7DY9k-0MM492CYFnv18jZWEKdIAeoefOeA6buR-7t2zW2-CcRYhdPb2uS7GIH2TjQrypB5N9EfBrgE8ElJ-n7Hd8uzWM8wYczlndStau049Ij0Te95VQ-Q8unyic5xRAldCX9Imk4aNwVrbiyxq-fe4cuKC2UARcxCKU6XmNAJK2cw/s1600/file_000000001368720693652074d42e904c.png">
    <div class="subtitle">Secure Vault</div>
  </div>
</div>

<script>

window.onload = function(){

  let tapCount = 0;
  const circle = document.getElementById("circle");

  const colors = [
    "#1e3c72",
    "#2a5298",
    "#0f2027",
    "#203a43",
    "#2c5364"
  ];

  circle.addEventListener("click", function(){

    tapCount++;

    document.body.style.background = colors[tapCount-1] || "#000";

    if(tapCount < 5){
      circle.innerText = "Tap " + (5 - tapCount) + " More";
    } else {
      circle.innerText = "Unlocked";
      unlock();
    }

  });

  function unlock(){

    circle.style.transform = "scale(0)";
    circle.style.opacity = "0";

    setTimeout(function(){
      document.getElementById("cardContainer").classList.add("reveal");
    },600);

  }

};

</script>

</body>
</html>

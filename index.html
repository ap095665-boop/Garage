<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Garage</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background:#000;
}

/* Background layers for smooth fade */
.bg-layer {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition: opacity 0.8s ease;
}

#bg1 { z-index:0; opacity:1; }
#bg2 { z-index:0; opacity:0; }

/* Tap Circle */
#circle {
  width:220px;
  height:220px;
  border-radius:50%;
  background:linear-gradient(145deg,#1c1c1c,#2b2b2b);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  color:white;
  cursor:pointer;
  user-select:none;
  position:relative;
  z-index:10;
  box-shadow:
    0 0 40px rgba(255,255,255,0.05),
    0 20px 50px rgba(0,0,0,0.6);
  transition: transform 0.2s ease, opacity 0.6s ease;
}

#circle:active {
  transform:scale(0.95);
}

/* Card Container */
#cardContainer {
  position:absolute;
  opacity:0;
  transform:scale(0.8) translateY(60px);
  transition: all 1s cubic-bezier(.2,.8,.2,1);
  pointer-events:none;
  z-index:20;
}

#card {
  width:360px;
  background:#ffffff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
}

#card img {
  width:100%;
  display:block;
}

.subtitle {
  padding:18px;
  font-size:20px;
  font-weight:bold;
  color:#000;
}

.reveal {
  opacity:1 !important;
  transform:scale(1) translateY(0) !important;
  pointer-events:auto !important;
}
</style>
</head>

<body>

<!-- Background Layers -->
<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>

<div id="circle">Tap 5 Times</div>

<div id="cardContainer">
  <div id="card">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi4_9-cxLIbHyEjh7DY9k-0MM492CYFnv18jZWEKdIAeoefOeA6buR-7t2zW2-CcRYhdPb2uS7GIH2TjQrypB5N9EfBrgE8ElJ-n7Hd8uzWM8wYczlndStau049Ij0Te95VQ-Q8unyic5xRAldCX9Imk4aNwVrbiyxq-fe4cuKC2UARcxCKU6XmNAJK2cw/s1600/file_000000001368720693652074d42e904c.png">
    <div class="subtitle">Secure Vault</div>
  </div>
</div>

<script>

window.onload = function(){

  let tapCount = 0;
  let activeBg = 1;

  const circle = document.getElementById("circle");
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");

  const images = [
    "https://ap095665-boop.github.io/garage/file_000000002e807207ac588015234ff912 (1).png",
    "https://cdn.pixabay.com/photo/2016/11/23/14/45/garage-1853644_1280.jpg",
    "https://cdn.pixabay.com/photo/2017/08/06/22/01/garage-2592837_1280.jpg",
    "https://cdn.pixabay.com/photo/2015/01/19/13/51/workshop-604919_1280.jpg",
    "https://cdn.pixabay.com/photo/2018/03/01/14/54/technology-3190193_1280.jpg"
  ];

  bg1.style.backgroundImage = "url('" + images[0] + "')";

  circle.addEventListener("click", function(){

    if(tapCount < 4){

      tapCount++;

      circle.innerText = "Tap " + (5 - tapCount) + " More";

      let nextImage = images[tapCount];

      if(activeBg === 1){
        bg2.style.backgroundImage = "url('" + nextImage + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
        activeBg = 2;
      } else {
        bg1.style.backgroundImage = "url('" + nextImage + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
        activeBg = 1;
      }

    } else {
      tapCount++;
      circle.innerText = "Unlocked";
      unlock();
    }

  });

  function unlock(){
    circle.style.transform = "scale(0)";
    circle.style.opacity = "0";

    setTimeout(function(){
      document.getElementById("cardContainer").classList.add("reveal");
    },700);
  }

};

</script>

</body>
</html>

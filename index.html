<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Garage</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
transition:background 0.6s;
}

/* top animated text card */

#textCard{
position:absolute;
top:70px;
background:rgba(0,0,0,0.6);
color:white;
padding:12px 22px;
border-radius:10px;
font-size:18px;
opacity:0;
z-index:5;
}

/* tap circle */

#tapCircle{
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,0.12);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
cursor:pointer;
user-select:none;
backdrop-filter:blur(8px);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
z-index:10;
}

#tapCircle:active{
transform:scale(.95);
}

/* popup */

#popup{
position:absolute;
background:#111;
color:white;
padding:15px 26px;
border-radius:10px;
font-size:18px;
opacity:0;
transform:scale(.7);
transition:.4s;
z-index:20;
}

/* item card */

#itemCard{
position:absolute;
bottom:80px;
width:300px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.45);
display:none;
z-index:30;
}

#itemCard img{
width:100%;
display:block;
}

.subtitle{
padding:12px;
font-weight:bold;
}

/* text animations */

.fade{animation:fade .5s forwards}
.slide{animation:slide .5s forwards}
.zoom{animation:zoom .5s forwards}
.rotate{animation:rotate .5s forwards}
.flip{animation:flip .5s forwards}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes slide{
from{opacity:0; transform:translateY(-20px)}
to{opacity:1; transform:translateY(0)}
}

@keyframes zoom{
from{opacity:0; transform:scale(.7)}
to{opacity:1; transform:scale(1)}
}

@keyframes rotate{
from{opacity:0; transform:rotate(-20deg)}
to{opacity:1; transform:rotate(0)}
}

@keyframes flip{
from{opacity:0; transform:rotateX(90deg)}
to{opacity:1; transform:rotateX(0)}
}

</style>
</head>

<body>

<div id="textCard"></div>

<div id="tapCircle">Tap</div>

<div id="popup">Item Found</div>

<div id="itemCard">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<div class="subtitle">Secure Vault</div>
</div>

<script>

let tap=0

const circle=document.getElementById("tapCircle")
const text=document.getElementById("textCard")
const popup=document.getElementById("popup")
const card=document.getElementById("itemCard")

const gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#36d1dc,#5b86e5)",
"linear-gradient(135deg,#f7971e,#ffd200)",
"linear-gradient(135deg,#00c6ff,#0072ff)",
"linear-gradient(135deg,#8e2de2,#4a00e0)"
]

const messages=[
"Accessing garage...",
"Scanning system...",
"Decrypting layers...",
"Verifying tools...",
"Unlocking vault..."
]

const animations=[
"fade",
"slide",
"zoom",
"rotate",
"flip"
]

circle.onclick=function(){

if(tap<5){

document.body.style.background=gradients[tap]

text.className=""
void text.offsetWidth

text.classList.add(animations[tap])
text.style.opacity=1
text.innerText=messages[tap]

tap++

if(tap==5){

setTimeout(()=>{

popup.style.opacity=1
popup.style.transform="scale(1)"

setTimeout(()=>{

popup.style.opacity=0

card.style.display="block"

circle.style.display="none"

},1200)

},700)

}

}

}

</script>

</body>
</html>

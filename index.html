<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Garage</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
transition:background 0.6s ease;
}

/* glow pulse animation */

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,255,255,.2)}
50%{box-shadow:0 0 40px rgba(255,255,255,.6)}
100%{box-shadow:0 0 10px rgba(255,255,255,.2)}
}

/* ripple animation */

@keyframes ripple{
0%{transform:scale(.5); opacity:.8}
100%{transform:scale(3); opacity:0}
}

/* cinematic flash */

@keyframes flash{
0%{opacity:0}
40%{opacity:1}
100%{opacity:0}
}

/* top text card */

#textCard{
position:absolute;
top:70px;
padding:12px 22px;
background:rgba(0,0,0,.55);
color:white;
border-radius:12px;
font-size:18px;
opacity:0;
}

/* tap circle */

#tapCircle{
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,.1);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
cursor:pointer;
user-select:none;
backdrop-filter:blur(8px);
animation:pulse 3s infinite;
position:relative;
z-index:5;
}

#tapCircle:active{
transform:scale(.94);
}

/* ripple element */

.ripple{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:2px solid rgba(255,255,255,.6);
animation:ripple .6s ease-out;
pointer-events:none;
}

/* popup */

#popup{
position:absolute;
background:#111;
color:white;
padding:14px 26px;
border-radius:10px;
font-size:18px;
opacity:0;
transform:scale(.7);
transition:.4s;
}

/* flash screen */

#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* item card */

#itemCard{
position:absolute;
bottom:90px;
width:300px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.45);
display:none;
}

#itemCard img{
width:100%;
display:block;
}

.subtitle{
padding:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="textCard"></div>

<div id="tapCircle">Tap</div>

<div id="popup">Item Found</div>

<div id="flash"></div>

<div id="itemCard">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<div class="subtitle">Secure Vault</div>
</div>

<script>

let tap=0

const circle=document.getElementById("tapCircle")
const text=document.getElementById("textCard")
const popup=document.getElementById("popup")
const flash=document.getElementById("flash")
const card=document.getElementById("itemCard")

const gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#36d1dc,#5b86e5)",
"linear-gradient(135deg,#f7971e,#ffd200)",
"linear-gradient(135deg,#00c6ff,#0072ff)",
"linear-gradient(135deg,#8e2de2,#4a00e0)"
]

const messages=[
"Accessing garage...",
"Scanning system...",
"Decrypting layers...",
"Verifying tools...",
"Unlocking vault..."
]

circle.onclick=function(e){

/* ripple effect */

let ripple=document.createElement("span")
ripple.className="ripple"
circle.appendChild(ripple)

setTimeout(()=>ripple.remove(),600)

if(tap<5){

document.body.style.background=gradients[tap]

text.style.opacity=1
text.innerText=messages[tap]

tap++

if(tap==5){

setTimeout(()=>{

popup.style.opacity=1
popup.style.transform="scale(1)"

/* cinematic flash */

flash.style.animation="flash .6s"

setTimeout(()=>{

popup.style.opacity=0

card.style.display="block"

circle.style.display="none"

},1200)

},600)

}

}

}

</script>

</body>
</html>

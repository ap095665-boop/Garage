<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Garage</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
transition:background .6s ease;
background:black;
}

/* glow pulse */

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,255,255,.2)}
50%{box-shadow:0 0 40px rgba(255,255,255,.7)}
100%{box-shadow:0 0 10px rgba(255,255,255,.2)}
}

/* ripple */

@keyframes ripple{
0%{transform:scale(.5);opacity:.8}
100%{transform:scale(3);opacity:0}
}

/* cinematic flash */

@keyframes flash{
0%{opacity:0}
40%{opacity:1}
100%{opacity:0}
}

/* text animations */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideDown{
from{opacity:0; transform:translateY(-40px)}
to{opacity:1; transform:translateY(0)}
}

@keyframes zoomIn{
from{opacity:0; transform:scale(.6)}
to{opacity:1; transform:scale(1)}
}

@keyframes rotateIn{
from{opacity:0; transform:rotate(-25deg)}
to{opacity:1; transform:rotate(0)}
}

@keyframes flipIn{
from{opacity:0; transform:rotateX(90deg)}
to{opacity:1; transform:rotateX(0)}
}

/* vault door animation */

@keyframes openVault{
0%{transform:rotate(0)}
100%{transform:rotate(-110deg)}
}

/* text card */

#textCard{
position:absolute;
top:70px;
background:rgba(0,0,0,.6);
color:white;
padding:12px 22px;
border-radius:10px;
font-size:18px;
opacity:0;
}

/* tap circle */

#tapCircle{
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,.1);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
cursor:pointer;
user-select:none;
animation:pulse 3s infinite;
position:relative;
}

#tapCircle:active{
transform:scale(.94);
}

/* ripple */

.ripple{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:2px solid rgba(255,255,255,.7);
animation:ripple .6s ease-out;
pointer-events:none;
}

/* flash */

#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* popup */

#popupScreen{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
display:none;
z-index:20;
}

/* item screen */

#itemScreen{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* vault door */

#vaultDoor{
width:220px;
height:220px;
border-radius:50%;
background:linear-gradient(#777,#444);
border:8px solid #222;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
margin-bottom:20px;
transform-origin:left center;
}

/* item card */

#itemCard{
width:300px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.45);
display:none;
}

#itemCard img{
width:100%;
display:block;
}

.subtitle{
padding:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="textCard"></div>

<div id="tapCircle">Tap</div>

<div id="flash"></div>

<div id="popupScreen">
<div>Item Found</div>
</div>

<div id="itemScreen">

<div id="vaultDoor">VAULT</div>

<div id="itemCard">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<div class="subtitle">Secure Vault</div>
</div>

</div>

<script>

let tap=0
let locked=false

const circle=document.getElementById("tapCircle")
const text=document.getElementById("textCard")
const flash=document.getElementById("flash")
const popup=document.getElementById("popupScreen")
const itemScreen=document.getElementById("itemScreen")
const vault=document.getElementById("vaultDoor")
const card=document.getElementById("itemCard")

const gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#36d1dc,#5b86e5)",
"linear-gradient(135deg,#f7971e,#ffd200)",
"linear-gradient(135deg,#00c6ff,#0072ff)",
"linear-gradient(135deg,#8e2de2,#4a00e0)"
]

const messages=[
"Accessing garage...",
"Scanning system...",
"Decrypting layers...",
"Verifying tools...",
"Unlocking vault..."
]

const animations=[
"fadeIn",
"slideDown",
"zoomIn",
"rotateIn",
"flipIn"
]

circle.onclick=function(){

if(locked)return

let ripple=document.createElement("span")
ripple.className="ripple"
circle.appendChild(ripple)
setTimeout(()=>ripple.remove(),600)

if(tap<5){

document.body.style.background=gradients[tap]

text.style.opacity=0
text.style.animation="none"
void text.offsetWidth

text.innerText=messages[tap]
text.style.animation=animations[tap]+" .6s forwards"

tap++

if(tap==5){

locked=true

setTimeout(()=>{

flash.style.animation="flash .6s"

popup.style.display="flex"

setTimeout(()=>{

popup.style.display="none"

itemScreen.style.display="flex"

/* open vault door */

setTimeout(()=>{

vault.style.animation="openVault 1.4s forwards"

setTimeout(()=>{

card.style.display="block"

},1200)

},400)

},1500)

},700)

}

}

}

</script>

</body>
</html>

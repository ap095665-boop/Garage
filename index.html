<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Digital Garage</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
transition:background 0.6s ease;
}

/* TOP TEXT CARD */

#textCard{
position:absolute;
top:60px;
padding:14px 26px;
background:rgba(0,0,0,0.55);
color:white;
border-radius:14px;
font-size:18px;
backdrop-filter:blur(8px);
opacity:0;
}

/* CENTER TAP CIRCLE */

#tapCircle{
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
cursor:pointer;
user-select:none;
backdrop-filter:blur(6px);
box-shadow:0 15px 50px rgba(0,0,0,0.4);
transition:transform .2s ease;
}

#tapCircle:active{
transform:scale(.94);
}

/* POPUP */

#popup{
position:absolute;
top:45%;
background:#111;
color:white;
padding:16px 28px;
border-radius:12px;
font-size:18px;
opacity:0;
transform:scale(.8);
transition:.4s;
}

/* IMAGE CARD */

#itemCard{
position:absolute;
bottom:90px;
width:300px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.45);
opacity:0;
transform:translateY(60px);
transition:.6s;
}

#itemCard img{
width:100%;
display:block;
}

.subtitle{
padding:12px;
font-weight:bold;
}

/* animations */

.fadeIn{
animation:fadeIn .5s forwards;
}

.slideDown{
animation:slideDown .5s forwards;
}

.zoomIn{
animation:zoomIn .5s forwards;
}

.rotateIn{
animation:rotateIn .5s forwards;
}

.flipIn{
animation:flipIn .5s forwards;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideDown{
from{opacity:0; transform:translateY(-20px)}
to{opacity:1; transform:translateY(0)}
}

@keyframes zoomIn{
from{opacity:0; transform:scale(.7)}
to{opacity:1; transform:scale(1)}
}

@keyframes rotateIn{
from{opacity:0; transform:rotate(-20deg)}
to{opacity:1; transform:rotate(0)}
}

@keyframes flipIn{
from{opacity:0; transform:rotateX(90deg)}
to{opacity:1; transform:rotateX(0)}
}

</style>
</head>

<body>

<div id="textCard"></div>

<div id="tapCircle">Tap</div>

<div id="popup">Item Found</div>

<div id="itemCard">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<div class="subtitle">Secure Vault</div>
</div>

<script>

let tap=0

const circle=document.getElementById("tapCircle")
const text=document.getElementById("textCard")
const popup=document.getElementById("popup")
const card=document.getElementById("itemCard")

const gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#36d1dc,#5b86e5)",
"linear-gradient(135deg,#f7971e,#ffd200)",
"linear-gradient(135deg,#00c6ff,#0072ff)",
"linear-gradient(135deg,#8e2de2,#4a00e0)"
]

const messages=[
"Accessing garage...",
"Scanning system...",
"Decrypting layers...",
"Verifying tools...",
"Unlocking vault..."
]

const animations=[
"fadeIn",
"slideDown",
"zoomIn",
"rotateIn",
"flipIn"
]

circle.onclick=()=>{

if(tap<5){

document.body.style.background=gradients[tap]

text.className=""
void text.offsetWidth
text.classList.add(animations[tap])

text.style.opacity=1
text.innerText=messages[tap]

tap++

if(tap==5){

setTimeout(()=>{

popup.style.opacity=1
popup.style.transform="scale(1)"

setTimeout(()=>{

popup.style.opacity=0

card.style.opacity=1
card.style.transform="translateY(0)"

circle.style.opacity=0

},1200)

},600)

}

}

}

</script>

</body>
</html>
